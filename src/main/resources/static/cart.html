<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Tester</title>
    <style>
        body { font-family: "Segoe UI", Tahoma, sans-serif; background: #f4f6fb; margin: 0; color: #1f2937; }
        .container { max-width: 980px; margin: 20px auto; padding: 0 14px; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
        button, a.btn { padding: 9px 12px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; text-decoration: none; cursor: pointer; }
        button.alt, a.btn.alt { background: #374151; }
        button.warn { background: #b91c1c; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #e5e7eb; }
        input { width: 70px; padding: 6px; border: 1px solid #d1d5db; border-radius: 7px; }
        .status { margin-top: 8px; font-size: 13px; white-space: pre-wrap; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <a class="btn alt" href="/">Back to Books</a>
        <button id="refreshBtn">Refresh Cart</button>
        <button id="clearBtn" class="warn">Clear Cart</button>
        <button id="checkoutBtn">Checkout</button>
        <button id="historyBtn" class="alt">Order History</button>
        <div id="status" class="status"></div>
    </div>

    <div class="card">
        <h3>Cart Items</h3>
        <table>
            <thead><tr><th>Book ID</th><th>Title</th><th>Qty</th><th>Price</th><th>Subtotal</th><th>Actions</th></tr></thead>
            <tbody id="rows"></tbody>
        </table>
        <p id="total"></p>
    </div>

    <div class="card">
        <h3>Order History</h3>
        <pre id="historyOut" style="white-space: pre-wrap;"></pre>
    </div>
</div>

<script>
    function authHeader() {
        const token = localStorage.getItem("tester_token") || "";
        if (!token) return null;
        return "Bearer " + token;
    }

    async function req(url, options = {}) {
        const hdr = authHeader();
        if (!hdr) throw new Error("Missing JWT token in browser. Go to / and click Test Login.");
        options.headers = Object.assign({}, options.headers || {}, { "Authorization": hdr });
        const res = await fetch(url, options);
        const text = await res.text();
        let body = text;
        try { body = JSON.parse(text); } catch (_) {}
        if (!res.ok) throw new Error(typeof body === "string" ? body : JSON.stringify(body));
        return body;
    }

    function setStatus(msg) { document.getElementById("status").textContent = msg; }

    async function loadCart() {
        try {
            const data = await req("/api/cart");
            const rows = (data.items || []).map(i => `
                <tr>
                    <td>${i.bookId}</td>
                    <td>${i.title}</td>
                    <td><input type="number" min="1" value="${i.quantity}" data-book-id="${i.bookId}" class="qty-input"></td>
                    <td>${i.price}</td>
                    <td>${i.subtotal}</td>
                    <td>
                        <button onclick="updateItem(${i.bookId})">Update</button>
                        <button class="warn" onclick="removeItem(${i.bookId})">Remove</button>
                    </td>
                </tr>
            `).join("");
            document.getElementById("rows").innerHTML = rows || "<tr><td colspan='6'>Cart is empty</td></tr>";
            document.getElementById("total").textContent = "Total: " + (data.total ?? 0);
            setStatus("Cart loaded");
        } catch (e) {
            setStatus("Load cart failed: " + e.message);
        }
    }

    async function updateItem(bookId) {
        const input = document.querySelector(`input.qty-input[data-book-id="${bookId}"]`);
        const quantity = parseInt(input.value || "1", 10);
        try {
            await req(`/api/cart/update?bookId=${bookId}&quantity=${quantity}`, { method: "PUT" });
            setStatus("Item updated");
            loadCart();
        } catch (e) {
            setStatus("Update failed: " + e.message);
        }
    }

    async function removeItem(bookId) {
        try {
            await req(`/api/cart/remove?bookId=${bookId}`, { method: "DELETE" });
            setStatus("Item removed");
            loadCart();
        } catch (e) {
            setStatus("Remove failed: " + e.message);
        }
    }

    async function clearCart() {
        try {
            await req("/api/cart/clear", { method: "DELETE" });
            setStatus("Cart cleared");
            loadCart();
        } catch (e) {
            setStatus("Clear failed: " + e.message);
        }
    }

    async function checkout() {
        try {
            const out = await req("/api/orders/checkout", { method: "POST" });
            setStatus("Checkout OK: " + JSON.stringify(out));
            loadCart();
        } catch (e) {
            setStatus("Checkout failed: " + e.message);
        }
    }

    async function history() {
        try {
            const out = await req("/api/orders/history");
            document.getElementById("historyOut").textContent = JSON.stringify(out, null, 2);
            setStatus("History loaded");
        } catch (e) {
            setStatus("History failed: " + e.message);
        }
    }

    document.getElementById("refreshBtn").onclick = loadCart;
    document.getElementById("clearBtn").onclick = clearCart;
    document.getElementById("checkoutBtn").onclick = checkout;
    document.getElementById("historyBtn").onclick = history;

    window.updateItem = updateItem;
    window.removeItem = removeItem;
    loadCart();
</script>
</body>
</html>
