<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details</title>
    <style>
        body { font-family: "Segoe UI", Tahoma, sans-serif; background: #f4f6fb; margin: 0; color: #1f2937; }
        .container { max-width: 920px; margin: 20px auto; padding: 0 14px; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
        .row { display: flex; gap: 14px; flex-wrap: wrap; }
        img { width: 220px; max-width: 100%; border-radius: 10px; border: 1px solid #e5e7eb; }
        .meta { flex: 1; min-width: 260px; }
        .meta p { margin: 7px 0; }
        input { padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; width: 90px; }
        button, a.btn { padding: 9px 12px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; text-decoration: none; cursor: pointer; display: inline-block; }
        a.btn.alt { background: #374151; }
        .status { margin-top: 10px; font-size: 13px; white-space: pre-wrap; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <a class="btn alt" href="/">Back to Books</a>
        <a class="btn alt" href="/cart.html">Go to Cart</a>
    </div>

    <div class="card">
        <div id="bookWrap">Loading...</div>
        <div style="margin-top: 10px;">
            <label>Quantity:
                <input id="qty" type="number" min="1" value="1">
            </label>
            <button id="addBtn">Add to Cart</button>
        </div>
        <div id="status" class="status"></div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const bookId = params.get("id");

    function creds() {
        return {
            email: localStorage.getItem("tester_email") || "",
            password: localStorage.getItem("tester_password") || ""
        };
    }

    function authHeader() {
        const c = creds();
        if (!c.email || !c.password) return null;
        return "Basic " + btoa(c.email + ":" + c.password);
    }

    async function req(url, options = {}) {
        const res = await fetch(url, options);
        const text = await res.text();
        let body = text;
        try { body = JSON.parse(text); } catch (_) {}
        if (!res.ok) throw new Error(typeof body === "string" ? body : JSON.stringify(body));
        return body;
    }

    async function loadBook() {
        if (!bookId) {
            document.getElementById("bookWrap").textContent = "Missing book id in URL";
            return;
        }
        try {
            const b = await req("/api/books/" + bookId);
            document.getElementById("bookWrap").innerHTML = `
                <div class="row">
                    <img src="${b.imageUrl || ""}" alt="${b.title || "Book"}">
                    <div class="meta">
                        <h2>${b.title || ""}</h2>
                        <p><strong>ID:</strong> ${b.id}</p>
                        <p><strong>Price:</strong> ${b.price}</p>
                        <p><strong>Stock:</strong> ${b.stock}</p>
                        <p><strong>Author:</strong> ${b.authorName || ""}</p>
                        <p><strong>Category:</strong> ${b.categoryName || ""}</p>
                        <p><strong>Description:</strong><br>${b.description || ""}</p>
                    </div>
                </div>
            `;
        } catch (e) {
            document.getElementById("bookWrap").textContent = "Load failed: " + e.message;
        }
    }

    document.getElementById("addBtn").onclick = async () => {
        const quantity = parseInt(document.getElementById("qty").value || "1", 10);
        const hdr = authHeader();
        if (!hdr) {
            document.getElementById("status").textContent = "Missing saved auth. Go back to / and save email/password first.";
            return;
        }
        try {
            await req(`/api/cart/add?bookId=${bookId}&quantity=${quantity}`, {
                method: "POST",
                headers: { "Authorization": hdr }
            });
            document.getElementById("status").textContent = "Added to cart";
        } catch (e) {
            document.getElementById("status").textContent = "Add failed: " + e.message;
        }
    };

    loadBook();
</script>
</body>
</html>
